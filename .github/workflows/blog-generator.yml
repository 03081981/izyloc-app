name: Blog Generator

on:
  schedule:
    # 9h BRT (UTC-3) = 12:00 UTC — turno da manha
    - cron: '0 12 * * *'
    # 18h BRT (UTC-3) = 21:00 UTC — turno da tarde
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo da execucao manual (opcional)'
        required: false
        default: 'teste manual'

permissions:
  contents: write

concurrency:
  group: blog-generator
  cancel-in-progress: false

jobs:
  generate:
    name: Gerar e publicar post
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/scripts/requirements.txt'

      - name: Instalar dependencias do gerador
        run: |
          pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: Gerar post via Claude + Unsplash
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python .github/scripts/generate-blog-post.py

      - name: Commit e push do post novo
        run: |
          git config user.name "izyLAUDO Blog Bot"
          git config user.email "blog-bot@izylaudo.com.br"
          git add static/site/blog/posts/ static/site/blog/.used-themes.json .github/blog-config/temas-blog.md .github/blog-config/used_images.json
          if git diff --cached --quiet; then
            echo "Nenhuma mudanca detectada — pulando commit"
            exit 0
          fi
          TITLE="${{ steps.gen.outputs.post_title }}"
          AUTHOR="${{ steps.gen.outputs.post_author }}"
          FILENAME="${{ steps.gen.outputs.post_filename }}"
          git commit -m "post(blog): ${TITLE}" \
                     -m "Author: ${AUTHOR}" \
                     -m "File: ${FILENAME}" \
                     -m "Auto-generated by GitHub Actions"
          git push
