<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#1565E8"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>izyLAUDO – Vistorias Imobiliárias</title>
<link rel="manifest" href="/static/manifest.json"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.7/signature_pad.umd.min.js"></script>

<style>
/* izyLAUDO Design System v8 — Premium SaaS */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
  --blue:        #1565D8;
  --blue-dark:   #0E3A75;
  --blue-mid:    #1E6FCC;
  --blue-light:  #EAF3FF;
  --blue-border: #C3D9F8;
  --sidebar-bg:  #0F1E3A;
  --sidebar-hover: #1A2F55;
  --sidebar-active: #1565D8;
  --sidebar-text: rgba(255,255,255,.65);
  --sidebar-text-active: #FFFFFF;
  --sidebar-w:   220px;
  --bg:          #F4F6FA;
  --white:       #FFFFFF;
  --border:      #D9E2EC;
  --border-light: #EDF2F7;
  --text:        #1A2540;
  --text-2:      #4A5568;
  --text-3:      #8898AA;
  --success:     #059669;
  --success-bg:  #D1FAE5;
  --warn:        #D97706;
  --warn-bg:     #FEF3C7;
  --error:       #DC2626;
  --error-bg:    #FEE2E2;
  --r:           12px;
  --r-sm:        8px;
  --r-lg:        16px;
  --r-xl:        20px;
  --sh:          0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
  --sh-md:       0 4px 12px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
  --sh-lg:       0 8px 24px rgba(0,0,0,.10), 0 16px 40px rgba(0,0,0,.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── TOPBAR (global back/logout bar) ─── */
#topbar {
  display: none;
  position: fixed; top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--white);
  border-bottom: 1px solid var(--border-light);
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 200;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
#topbar.show { display: flex; }
#btn-back {
  background: none; border: none; cursor: pointer;
  width: 36px; height: 36px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: background .15s;
}
#btn-back:hover { background: var(--bg); }
#btn-back svg { width: 20px; height: 20px; }
#topbar-title {
  flex: 1;
  font-size: 15px; font-weight: 600; color: var(--text);
}
#btn-logout {
  background: none; border: none; cursor: pointer;
  font-size: 13px; color: var(--text-3); font-weight: 500;
  padding: 6px 10px; border-radius: var(--r-sm);
  transition: all .15s;
}
#btn-logout:hover { background: var(--bg); color: var(--text-2); }

/* ─── PAGE SYSTEM ─── */
.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* ─── AUTH PAGE ─── */
#page-auth {
  display: none;
  min-height: 100vh;
  background: linear-gradient(135deg, #0F1E3A 0%, #1565D8 100%);
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#page-auth.active { display: flex; }

.auth-card {
  background: var(--white);
  border-radius: var(--r-xl);
  padding: 40px;
  width: 100%; max-width: 420px;
  box-shadow: var(--sh-lg);
}

.auth-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px;
  justify-content: center;
}
.auth-logo-icon {overflow:visible;
  width: 40px; height: 40px;
}
.auth-logo-text {
  font-size: 22px; font-weight: 800; color: var(--blue);
  letter-spacing: -.5px;
}

.auth-title {
  font-size: 22px; font-weight: 700; color: var(--text);
  margin-bottom: 6px;
}
.auth-sub {
  font-size: 14px; color: var(--text-3);
  margin-bottom: 28px;
}

.form-group { margin-bottom: 16px; }
.form-label {
  display: block;
  font-size: 13px; font-weight: 500; color: var(--text-2);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  height: 44px;
  padding: 0 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-size: 14px; color: var(--text);
  background: var(--white);
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.form-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(21,101,216,.12);
}
.form-input::placeholder { color: var(--text-3); }
.form-input.error { border-color: var(--error); }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  height: 44px;
  padding: 0 20px;
  border: none; cursor: pointer;
  border-radius: var(--r-sm);
  font-family: inherit;
  font-size: 14px; font-weight: 600;
  transition: all .18s;
  text-decoration: none;
  white-space: nowrap;
}
.btn-primary {
  background: var(--blue); color: var(--white);
  box-shadow: 0 2px 8px rgba(21,101,216,.25);
}
.btn-primary:hover {
  background: var(--blue-mid);
  box-shadow: 0 4px 14px rgba(21,101,216,.35);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }
.btn-full { width: 100%; }
.btn-ghost {
  background: none; color: var(--text-2);
  border: 1.5px solid var(--border);
}
.btn-ghost:hover { background: var(--bg); border-color: var(--text-3); }

.auth-switch {
  text-align: center; margin-top: 20px;
  font-size: 13px; color: var(--text-3);
}
.auth-link {
  color: var(--blue); font-weight: 600; cursor: pointer;
  background: none; border: none; font-family: inherit; font-size: 13px;
  text-decoration: none;
}
.auth-link:hover { text-decoration: underline; }

.auth-error {
  background: var(--error-bg);
  border: 1px solid #FECACA;
  border-radius: var(--r-sm);
  padding: 10px 14px;
  font-size: 13px; color: var(--error);
  margin-bottom: 16px;
  display: none;
}
.auth-error.show { display: block; }

/* ─── AUTH FORMS TOGGLE ─── */
#form-login, #form-register, #form-forgot { display: none; }
#form-login.show, #form-register.show, #form-forgot.show { display: block; }

/* ─── RESET PAGE ─── */
#page-reset {
  display: none;
  min-height: 100vh;
  background: linear-gradient(135deg, #0F1E3A 0%, #1565D8 100%);
  align-items: center; justify-content: center;
  padding: 24px;
}
#page-reset.active { display: flex; }
.reset-card {
  background: var(--white); border-radius: var(--r-xl);
  padding: 40px; width: 100%; max-width: 420px;
  box-shadow: var(--sh-lg);
}
#reset-checking, #reset-link-box, #reset-form, #reset-success { display: none; }
#reset-checking.show, #reset-link-box.show, #reset-form.show, #reset-success.show { display: block; }
.reset-icon-wrap {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--blue-light);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
}
.reset-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.reset-sub { font-size: 14px; color: var(--text-3); margin-bottom: 24px; }
#reset-invalid {
  color: var(--error); font-size: 13px;
  margin-top: 8px; display: none;
}
#reset-invalid.show { display: block; }
.reset-email-box {
  background: var(--blue-light);
  border-radius: var(--r-sm);
  padding: 12px 16px;
  font-size: 14px; font-weight: 600; color: var(--blue);
  margin-bottom: 20px;
  word-break: break-all;
}
.reset-success-icon {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--success-bg);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
}

/* ─── APP LAYOUT (sidebar + main) ─── */
#page-dashboard {
  display: none;
  min-height: 100vh;
}
#page-dashboard.active {
  display: flex;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  display: flex; flex-direction: column; align-items: flex-start;
  border-bottom: 1px solid rgba(255,255,255,.07);
  flex-shrink: 0;
}
.sidebar-logo-icon {overflow:visible; width: 32px; height: 32px; flex-shrink: 0; }
.sidebar-logo-text {
  font-size: 18px; font-weight: 800;
  color: var(--white); letter-spacing: -.4px;
}

.sidebar-section-label {
  font-size: 10px; font-weight: 600;
  color: rgba(255,255,255,.3);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 20px 20px 6px;
}

.sidebar-nav {
  flex: 1; padding: 8px 12px;
  display: flex; flex-direction: column; gap: 2px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--r-sm);
  font-size: 13.5px; font-weight: 500;
  color: var(--sidebar-text);
  cursor: pointer;
  transition: all .16s;
  text-decoration: none;
  border: none; background: none; font-family: inherit;
  width: 100%; text-align: left;
}
.nav-item:hover {
  background: var(--sidebar-hover);
  color: var(--white);
}
.nav-item.active {
  background: var(--blue);
  color: var(--white);
  font-weight: 600;
}
.nav-item.active .nav-icon-wrap { opacity: 1; }
.nav-icon-wrap {
  width: 18px; height: 18px; flex-shrink: 0; opacity: .7;
}
.nav-item:hover .nav-icon-wrap { opacity: 1; }
.nav-divider {
  height: 1px; background: rgba(255,255,255,.07);
  margin: 8px 12px;
}
.sidebar-bottom {
  padding: 12px; border-top: 1px solid rgba(255,255,255,.07);
  flex-shrink: 0;
}
.sidebar-user {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background .16s;
}
.sidebar-user:hover { background: var(--sidebar-hover); }
.sidebar-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--white);
  flex-shrink: 0;
}
.sidebar-user-info { overflow: hidden; }
.sidebar-user-name {
  font-size: 13px; font-weight: 600; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-user-sub {
  font-size: 11px; color: rgba(255,255,255,.4);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ─── MAIN WRAPPER ─── */
.dash-main-wrapper {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  flex: 1;
  display: flex; flex-direction: column;
  min-width: 0;
}

/* ─── DASH TOPBAR ─── */
.dash-topbar {
  height: 64px;
  background: var(--white);
  border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky; top: 0;
  z-index: 50;
  flex-shrink: 0;
}
.dash-topbar-title {
  font-size: 18px; font-weight: 700; color: var(--text);
  flex: 1;
}
.dash-topbar-right {
  display: flex; align-items: center; gap: 12px;
}
.topbar-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--white);
  cursor: pointer;
}
.topbar-user-name {
  font-size: 14px; font-weight: 500; color: var(--text);
}
.topbar-icon-btn {
  width: 36px; height: 36px;
  border: none; background: none; cursor: pointer;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-3);
  transition: background .15s;
}
.topbar-icon-btn:hover { background: var(--bg); color: var(--text-2); }

/* ─── DASH TAB CONTENT ─── */
.dash-tab-content {
  flex: 1; padding: 28px;
  display: none;
}
.dash-tab-content.active { display: block; }

/* ─── DASH GRID ─── */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 24px;
  align-items: start;
}

/* ─── SECTION HEADER ─── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; margin-top: 24px;
}
.section-title {
  font-size: 16px; font-weight: 700; color: var(--text);
}
.section-link {
  font-size: 13px; font-weight: 500; color: var(--blue);
  cursor: pointer; text-decoration: none;
}
.section-link:hover { text-decoration: underline; }

/* ─── STAT CARDS ─── */
.stat-cards-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 4px;
}
.stat-card {
  background: var(--white);
  border-radius: var(--r);
  padding: 20px 18px;
  box-shadow: var(--sh);
  border: 1px solid var(--border-light);
  position: relative; overflow: hidden;
}
.stat-card-accent { border-top: 3px solid var(--blue); }
.stat-card-icon {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
}
.stat-card-icon svg { width: 18px; height: 18px; }
.stat-icon-blue { background: var(--blue-light); color: var(--blue); }
.stat-icon-green { background: #D1FAE5; color: #059669; }
.stat-icon-warn { background: #FEF3C7; color: #D97706; }
.stat-value {
  font-size: 26px; font-weight: 800; color: var(--text);
  line-height: 1; margin-bottom: 4px;
}
.stat-label {
  font-size: 12px; font-weight: 500; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .5px;
}

/* ─── INSPECTIONS LIST ─── */
#inspections-list {
  display: flex; flex-direction: column; gap: 10px;
}
.insp-card {
  background: var(--white);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  border: 1px solid var(--border-light);
  box-shadow: var(--sh);
  transition: all .16s;
}
.insp-card:hover {
  border-color: var(--blue-border);
  box-shadow: var(--sh-md);
  transform: translateY(-1px);
}
.insp-thumb {
  width: 52px; height: 52px; border-radius: var(--r-sm);
  background: var(--bg); flex-shrink: 0;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.insp-thumb img { width: 100%; height: 100%; object-fit: cover; }
.insp-thumb-icon {
  width: 24px; height: 24px; color: var(--text-3);
}
.insp-info { flex: 1; min-width: 0; }
.insp-address {
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.insp-meta {
  font-size: 12px; color: var(--text-3); margin-top: 3px;
  display: flex; gap: 10px; align-items: center;
}
.insp-badge {
  display: inline-flex; align-items: center;
  padding: 3px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .3px;
}
.badge-rascunho { background: var(--warn-bg); color: var(--warn); }
.badge-concluído { background: var(--success-bg); color: var(--success); }
.badge-andamento { background: var(--blue-light); color: var(--blue); }
.insp-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  flex-shrink: 0;
}
.insp-date { font-size: 12px; color: var(--text-3); }
.insp-type {
  font-size: 11px; font-weight: 600;
  color: var(--blue); background: var(--blue-light);
  padding: 2px 8px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: .3px;
}
.inspections-empty {
  text-align: center; padding: 48px 20px; color: var(--text-3);
}

/* ─── NEW DASHBOARD v2 ─── */
.db-hero {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.db-greeting {
  font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.2;
}
.db-subtitle {
  font-size: 14px; color: var(--text-3); margin-top: 4px;
}
.db-btn-nova {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--blue); color: #fff;
  border: none; border-radius: var(--r); padding: 11px 20px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 14px rgba(21,101,216,.30);
  transition: background .15s, transform .1s, box-shadow .15s;
  white-space: nowrap;
}
.db-btn-nova:hover {
  background: var(--blue-mid);
  box-shadow: 0 6px 20px rgba(21,101,216,.40);
  transform: translateY(-1px);
}
.db-btn-nova:active { transform: translateY(0); }

/* stat cards */
.db-cards-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.db-card {
  background: var(--white);
  border-radius: var(--r);
  padding: 20px 18px 16px;
  box-shadow: var(--sh);
  border: 1px solid var(--border-light);
  border-top: 3px solid transparent;
  position: relative; overflow: hidden;
  transition: box-shadow .15s, transform .15s;
}
.db-card:hover { box-shadow: var(--sh-md); transform: translateY(-2px); }
.db-card-blue  { border-top-color: var(--blue); }
.db-card-green { border-top-color: #059669; }
.db-card-warn  { border-top-color: #D97706; }
.db-card-purple{ border-top-color: #7C3AED; }
.db-card-gray  { border-top-color: #8898AA; }
.db-card-icon {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.db-card-blue  .db-card-icon { background: var(--blue-light); color: var(--blue); }
.db-card-green .db-card-icon { background: #D1FAE5; color: #059669; }
.db-card-warn  .db-card-icon { background: #FEF3C7; color: #D97706; }
.db-card-purple.db-card-icon { background: #EDE9FE; color: #7C3AED; }
.db-card-gray  .db-card-icon { background: var(--border-light); color: var(--text-3); }
.db-card-purple .db-card-icon { background: #EDE9FE; color: #7C3AED; }
.db-card-gray   .db-card-icon { background: var(--border-light); color: var(--text-3); }
.db-card-icon svg { width: 18px; height: 18px; }
.db-card-value {
  font-size: 28px; font-weight: 800; color: var(--text);
  line-height: 1; margin-bottom: 6px;
}
.db-card-label {
  font-size: 11px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .5px;
}

/* main grid */
.db-main-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 24px;
  align-items: start;
}
.db-col-main { min-width: 0; }
.db-col-side { display: flex; flex-direction: column; gap: 20px; }

/* section header */
.db-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.db-section-title {
  font-size: 15px; font-weight: 700; color: var(--text);
}
.db-section-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 13px; font-weight: 500; color: var(--blue);
  cursor: pointer; text-decoration: none;
}
.db-section-link:hover { text-decoration: underline; }

/* panels */
.db-panel {
  background: var(--white);
  border-radius: var(--r);
  border: 1px solid var(--border-light);
  box-shadow: var(--sh);
  padding: 18px;
}
.db-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.db-panel-title {
  font-size: 14px; font-weight: 700; color: var(--text);
}

/* balance block */
.db-balance-block {
  background: var(--blue-light);
  border-radius: var(--r-sm);
  padding: 14px;
  margin-bottom: 16px;
}
.db-balance-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.db-balance-label {
  font-size: 11px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: .4px;
}
.db-balance-value {
  font-size: 22px; font-weight: 800; color: var(--blue); margin-top: 2px;
}
.db-balance-badge {
  width: 40px; height: 40px; border-radius: var(--r-sm);
  background: var(--blue); color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.db-price-row {
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--blue-border); padding-top: 10px;
}
.db-price-label { font-size: 12px; color: var(--text-2); }
.db-price-val   { font-size: 13px; font-weight: 700; color: var(--blue); }

/* extrato mini table */
.db-extrato-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.db-extrato-table th {
  text-align: left; padding: 6px 4px;
  color: var(--text-3); font-weight: 600;
  text-transform: uppercase; letter-spacing: .4px; font-size: 10px;
  border-bottom: 1px solid var(--border-light);
}
.db-extrato-table td {
  padding: 9px 4px; border-bottom: 1px solid var(--border-light);
  color: var(--text-2);
}
.db-extrato-table tr:last-child td { border-bottom: none; }

/* quick actions */
.db-quick-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.db-qa-btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border-light);
  border-radius: var(--r); padding: 14px 10px;
  cursor: pointer; transition: all .15s;
  font-size: 12px; font-weight: 600; color: var(--text-2);
}
.db-qa-btn:hover {
  background: var(--white);
  box-shadow: var(--sh);
  border-color: var(--blue-border);
  color: var(--blue);
}
.db-qa-icon {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
}
.db-qa-icon svg { width: 18px; height: 18px; }
.db-qa-blue   { background: var(--blue-light); color: var(--blue); }
.db-qa-green  { background: #D1FAE5; color: #059669; }
.db-qa-warn   { background: #FEF3C7; color: #D97706; }
.db-qa-purple { background: #EDE9FE; color: #7C3AED; }
.inspections-empty svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: .3; }
.inspections-empty p { font-size: 14px; }

/* ─── CREDITS PANEL ─── */
.credits-panel {
  background: var(--white);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--sh);
  border: 1px solid var(--border-light);
  margin-bottom: 16px;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border-light);
}
.panel-title {
  font-size: 14px; font-weight: 700; color: var(--text);
}
.credits-balance-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--blue-light);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  margin-bottom: 14px;
}
.credits-bal-label { font-size: 12px; color: var(--text-3); font-weight: 500; }
.credits-bal-value { font-size: 18px; font-weight: 800; color: var(--blue); }
.credits-bal-price { font-size: 12px; color: var(--text-3); }
.pkg-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin-bottom: 14px;
}
.pkg-btn {
  padding: 8px 6px;
  border: 1.5px solid var(--blue-border);
  border-radius: var(--r-sm);
  background: var(--white); cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 600;
  color: var(--blue); text-align: center;
  transition: all .15s;
}
.pkg-btn:hover { background: var(--blue-light); border-color: var(--blue); }
.pkg-btn.selected { background: var(--blue); color: var(--white); border-color: var(--blue); }
.pkg-price-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.pkg-price-label { font-size: 13px; color: var(--text-2); font-weight: 500; }
.pkg-price-val { font-size: 16px; font-weight: 700; color: var(--text); }
.btn-recharge {
  width: 100%; height: 40px;
  background: var(--blue); color: var(--white);
  border: none; border-radius: var(--r-sm);
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .16s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-recharge:hover { background: var(--blue-mid); transform: translateY(-1px); }
.credits-note {
  font-size: 11px; color: var(--text-3); text-align: center; margin-top: 8px;
}

/* ─── EXTRATO PANEL ─── */
.extrato-panel {
  background: var(--white);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--sh);
  border: 1px solid var(--border-light);
}
.extrato-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px;
}
.extrato-table th {
  text-align: left; padding: 6px 6px 10px;
  font-size: 11px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .4px;
  border-bottom: 1px solid var(--border-light);
}
.extrato-table td {
  padding: 9px 6px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-2); vertical-align: middle;
}
.extrato-table tr:last-child td { border-bottom: none; }
.extrato-type-badge {
  display: inline-block; padding: 2px 7px;
  border-radius: 20px; font-size: 10px; font-weight: 600;
}
.ext-credit { background: var(--success-bg); color: var(--success); }
.ext-debit { background: #FEE2E2; color: #DC2626; }
.ext-laudo { background: var(--blue-light); color: var(--blue); }

/* ─── DASHBOARD STATS TAB ─── */
.stats-section { padding: 4px 0; }
.stats-grid-full {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 16px; margin-bottom: 24px;
}

/* ─── PROFILE TAB ─── */
.profile-card {
  background: var(--white); border-radius: var(--r-lg);
  box-shadow: var(--sh); border: 1px solid var(--border-light);
  max-width: 520px;
}
.profile-header {
  background: linear-gradient(135deg, #0F1E3A 0%, #1565D8 100%);
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  padding: 28px; display: flex; align-items: center; gap: 16px;
}
.profile-avatar-lg {
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 800; color: var(--blue);
}
.profile-header-info { color: var(--white); }
.profile-header-name { font-size: 18px; font-weight: 700; }
.profile-header-role { font-size: 13px; opacity: .7; }
.profile-body { padding: 24px; }
.profile-field {
  padding: 12px 0; border-bottom: 1px solid var(--border-light);
  display: flex; flex-direction: column; gap: 3px;
}
.profile-field:last-child { border-bottom: none; }
.profile-field-label {
  font-size: 11px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .5px;
}
.profile-field-value { font-size: 14px; font-weight: 500; color: var(--text); }

/* ─── NAV DASH TABS (hidden, kept for JS compat) ─── */
.dash-nav-tabs { display: none !important; }
.dash-header { display: none !important; }

/* ─── WIZARD PAGE ─── */
#page-wizard {
  display: none;
  min-height: 100vh;
  flex-direction: row;
  background: var(--bg);
}
#page-wizard.active { display: flex; }
.wiz-main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; margin-left: 220px; }
.wiz-topbar { height: 56px; display: flex; align-items: center; gap: 14px; padding: 0 24px; background: var(--white); border-bottom: 1px solid var(--border-light); flex-shrink: 0; }

.wizard-header {
  background: var(--white);
  border-bottom: 1px solid var(--border-light);
  padding: 0 24px;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
  flex-shrink: 0;
}
.wizard-header-top {
  height: 56px; display: flex; align-items: center; gap: 14px;
}
.wiz-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 800; color: var(--blue);
}
.wiz-logo svg { width: 24px; height: 24px; }
.wiz-title-block { flex: 1; }
.wiz-page-title { font-size: 14px; font-weight: 700; color: var(--text); }
.wiz-page-sub { font-size: 12px; color: var(--text-3); }
.btn-wiz-back {
  background: none; border: none; cursor: pointer;
  width: 36px; height: 36px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); transition: background .15s;
}
.btn-wiz-back:hover { background: var(--bg); }

/* ─── STEPPER ─── */
.wizard-stepper-wrap {
  padding: 12px 0 14px;
  overflow-x: auto;
}
.wizard-stepper {
  display: flex; align-items: center; gap: 0;
  min-width: max-content;
}
.step-item {
  display: flex; flex-direction: column; align-items: center;
  position: relative; min-width: 56px;
}
.step-item + .step-item::before {
  content: '';
  position: absolute; top: 11px; right: 50%;
  left: -50%; height: 2px;
  background: var(--border);
  z-index: 0;
}
.step-item.done + .step-item::before { background: var(--blue); }
.step-circle {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--text-3);
  position: relative; z-index: 1;
  transition: all .2s;
}
.step-item.active .step-circle {
  border-color: var(--blue); background: var(--blue); color: var(--white);
}
.step-item.done .step-circle {
  border-color: var(--blue); background: var(--blue); color: var(--white);
}
.step-label {
  font-size: 9px; font-weight: 500; color: var(--text-3);
  margin-top: 5px; white-space: nowrap;
}
.step-item.active .step-label { color: var(--blue); font-weight: 600; }
.step-item.done .step-label { color: var(--blue); }

/* ─── WIZARD CONTENT ─── */
.page-content {
  flex: 1; overflow-y: auto; padding: 28px 24px;
}

.wiz-section-title {
  font-size: 22px; font-weight: 800; color: var(--text);
  margin-bottom: 6px;
}
.wiz-section-sub {
  font-size: 14px; color: var(--text-2);
  margin-bottom: 28px;
}

/* ─── TIPO CARDS (WIZARD STEP 0) ─── */
.tipo-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; margin-bottom: 24px;
}
.tipo-card {
  border-radius: 12px;
  overflow: hidden;
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all .2s;
  background: var(--white);
  box-shadow: var(--sh);
  position: relative;
}
.tipo-card:hover {
  border-color: var(--blue-border);
  box-shadow: var(--sh-md);
  transform: translateY(-2px);
}
.tipo-card.selected {
  border-color: #2d7dd2;
  box-shadow: 0 0 0 3px rgba(45,125,210,.12), var(--sh-md);
}
.tc-photo {
  height: 180px; position: relative;
  background-size: cover; background-position: center;
  overflow: hidden;
}
.tc-photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.15) 60%, transparent 100%);
  display: flex; flex-direction: column;
  justify-content: flex-end; padding: 14px;
}
.tc-photo-title {
  font-size: 13px; font-weight: 800; color: var(--white);
  text-transform: uppercase; letter-spacing: .5px;
  line-height: 1.2;
}
.tc-photo-sub {
  font-size: 11px; color: rgba(255,255,255,.8); margin-top: 3px;
  font-weight: 400;
}
.tc-footer { padding: 10px 14px 12px; }
.tc-label { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.tc-sub { font-size: 11px; color: var(--text-3); }
.tc-tag { position: absolute; top: 10px; left: 10px; padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: .4px; z-index: 2; }
.tc-tag-entrada { background: rgba(34,139,34,.85); }
.tc-tag-saída { background: rgba(220,100,0,.85); }
.tc-tag-temporada { background: rgba(21,101,216,.85); }
.tc-checkmark { position: absolute; top: 10px; right: 10px; width: 22px; height: 22px; border-radius: 50%; background: #2d7dd2; display: none; align-items: center; justify-content: center; z-index: 2; }
.tipo-card.selected .tc-checkmark { display: flex; }
.tipo-img-wrap { height: 180px; overflow: hidden; }
.tipo-img-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
@media (max-width: 768px) {
  .wiz-main-wrapper { margin-left: 0 !important; }
  .sidebar { display: none; }
  .tipo-cards { grid-template-columns: 1fr !important; }
  .tipo-img-wrap { height: 160px; }
  .tc-photo { height: 160px; }
  .form-row { grid-template-columns: 1fr !important; }
  .form-grid { grid-template-columns: 1fr !important; }
}
.tc-check {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; color: var(--text-3);
}
.tc-check-icon {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  flex-shrink: 0;
}
.tipo-card.selected .tc-check {
  color: var(--blue);
}
.tipo-card.selected .tc-check-icon {
  background: var(--blue); border-color: var(--blue);
}
.tc-check-icon svg { display: none; }
.tipo-card.selected .tc-check-icon svg { display: block; }

.wiz-info-box {
  background: #EAF3FF; border: 1px solid var(--blue-border);
  border
