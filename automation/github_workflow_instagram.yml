name: Instagram Auto-Post

on:
  schedule:
    # 9h BRT (12h UTC) e 18h BRT (21h UTC) todos os dias
    - cron: '0 12,21 * * *'
  workflow_dispatch:  # permite rodar manualmente do GitHub Actions UI

permissions:
  contents: write  # pra commitar o state.json atualizado

jobs:
  instagram-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run Instagram auto-post
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python .github/scripts/instagram_auto_post.py

      - name: Commit state.json se mudou
        run: |
          if [[ -n $(git status --porcelain automation/instagram_state.json) ]]; then
            git config user.email "automation@izylaudo.com.br"
            git config user.name "izyLAUDO Automation Bot"
            git add automation/instagram_state.json
            git commit -m "chore(automation): update instagram_state after publish"
            git push
          else
            echo "Nenhuma mudanca no state.json"
          fi
